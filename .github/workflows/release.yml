name: Release Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install wxPython accessible_output2 || echo "Optional runtime dependency install may vary in CI"

      - name: Build EXE
        shell: pwsh
        run: |
          pyinstaller --clean --noconfirm FootballManager26.spec

      - name: Zip artifact
        shell: pwsh
        run: |
          Compress-Archive -Path dist\FootballManager26\* -DestinationPath FootballManager26-windows.zip -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            FootballManager26-windows.zip
