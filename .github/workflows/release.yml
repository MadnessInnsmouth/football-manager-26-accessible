name: Build, Tag and Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller wxPython accessible_output2 websocket-client requests

      - name: Configure git
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version, commit and tag
        id: versioning
        shell: pwsh
        run: |
          python tools\bump_version_and_tag.py --bump ${{ github.event.inputs.bump }}
          $version = Get-Content VERSION | Select-Object -First 1
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          git push origin HEAD:main --follow-tags

      - name: Build EXE
        shell: pwsh
        run: |
          pyinstaller --clean --noconfirm FootballManager26.spec

      - name: Zip artifact
        shell: pwsh
        run: |
          Compress-Archive -Path dist\FootballManager26\* -DestinationPath FootballManager26-windows.zip -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.versioning.outputs.version }}
          name: Football Manager 26 Accessible v${{ steps.versioning.outputs.version }}
          files: |
            FootballManager26-windows.zip
          generate_release_notes: true
