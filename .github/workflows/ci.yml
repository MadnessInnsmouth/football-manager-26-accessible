name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install wxPython accessible_output2 || echo "Optional deps not fully installed in CI"

      - name: Compile check
        shell: pwsh
        run: |
          python -m py_compile main.py ui.py game_engine.py match_engine.py models.py database.py engine_bridge.py save_system.py speech.py services\game_service.py services\network_service.py multiplayer_server\server.py

      - name: Run validations if present
        shell: pwsh
        run: |
          if (Test-Path reviewer_validation.py) { python reviewer_validation.py }
          if (Test-Path ui_access_validation.py) { python ui_access_validation.py }
